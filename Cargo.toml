[package]
name = "rubikscube"
version = "0.1.0"
edition = "2024"

[dependencies]
num-format = "0.4.4"
rand = "0.10.0"
rayon = "1.11.0"
kiss3d = { version = "0.40", features = ["egui"] }

[dev-dependencies]
itertools = "0.14"

[[bin]]
name = "benchmark"
path = "src/benchmark.rs"

[[bin]]
name = "gui"
path = "src/gui.rs"
